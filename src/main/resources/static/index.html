<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Stremio Admin - Mario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; padding: 20px; }
        .card { background: #1e1e1e; color: white; border: 1px solid #333; }
        .form-control { background: #2b2b2b; color: white; border: 1px solid #444; }
        .form-control:focus { background: #333; color: white; }
        .table { color: white; }
        .table th, .table td { border-color: #333; background: #1e1e1e;}
    </style>
</head>
<body onload="cargarPeliculas()">
<div class="container">
    <h2 class="mb-4 text-center text-primary">🎬 Mi Catálogo 4K - Stremio</h2>

    <!-- SECCIÓN 1: AGREGAR PELÍCULA -->
    <div class="card p-4 mb-4">
        <h4 class="mb-3">Añadir Nueva</h4>
        <div class="mb-3">
            <label class="text-info">ID o Enlace de IMDb</label>
            <!-- Al pegar o escribir, la función autoExtraerId entra en acción -->
            <input type="text" id="imdbId" class="form-control" placeholder="Ej: https://www.imdb.com/title/tt32246771/ o solo tt32246771" oninput="autoExtraerId()">
            <small id="alertaRegex" class="text-success d-none">¡ID extraído automáticamente!</small>
        </div>
        <div class="mb-3">
            <label>Título (Solo para tu referencia)</label>
            <input type="text" id="titulo" class="form-control">
        </div>
        <div class="mb-3">
            <label>Enlace Magnet</label>
            <textarea id="magnet" class="form-control" rows="2" placeholder="magnet:?xt=urn:btih:..."></textarea>
        </div>
        <button onclick="guardar()" class="btn btn-primary w-100 fw-bold">Guardar en Base de Datos</button>
        <div id="mensaje" class="mt-2"></div>
    </div>

    <!-- SECCIÓN 2: GESTIÓN DE PELÍCULAS VISTAS -->
    <div class="card p-4">
        <h4 class="mb-3">Películas Disponibles</h4>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>ID IMDb</th>
                    <th>Título Interno</th>
                    <th class="text-end">Acción</th>
                </tr>
                </thead>
                <tbody id="tablaPeliculas">
                <!-- Aquí se inyectan las películas desde Javascript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- MAGIA AUTOMÁTICA DE EXTRACCIÓN ---
    function autoExtraerId() {
        const input = document.getElementById('imdbId');
        const texto = input.value;
        const alerta = document.getElementById('alertaRegex');

        // Busca la secuencia 'tt' seguida de números usando Regex
        const match = texto.match(/(tt\d+)/);

        // Si encuentra el ID y detecta que pegaste un link largo de imdb
        if (match && texto.includes("imdb.com")) {
            input.value = match[0]; // Reemplaza todo el chorro de texto solo por el "tt..."

            // Efecto visual para confirmar
            alerta.classList.remove('d-none');
            setTimeout(() => alerta.classList.add('d-none'), 3000);
        }
    }

    // --- GUARDAR PELÍCULA ---
    async function guardar() {
        const data = {
            imdbId: document.getElementById('imdbId').value.trim(),
            titulo: document.getElementById('titulo').value.trim(),
            magnetLink: document.getElementById('magnet').value.trim(),
            posterUrl: "temp"
        };

        if(!data.imdbId || !data.magnetLink) {
            alert("El ID y el Magnet son obligatorios.");
            return;
        }

        const response = await fetch('/api/peliculas', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(response.ok) {
            document.getElementById('mensaje').innerHTML = '<div class="alert alert-success mt-2 py-2">¡Guardada! Aparecerá en Stremio.</div>';
            document.getElementById('imdbId').value = '';
            document.getElementById('titulo').value = '';
            document.getElementById('magnet').value = '';
            cargarPeliculas(); // Refresca la tabla automáticamente
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
        } else {
            alert("Error al guardar. Verifica que el ID no esté duplicado.");
        }
    }

    // --- CARGAR LISTA DE PELÍCULAS ---
    async function cargarPeliculas() {
        const response = await fetch('/api/peliculas');
        const peliculas = await response.json();
        const tbody = document.getElementById('tablaPeliculas');
        tbody.innerHTML = '';

        peliculas.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td class="text-info">${p.imdbId}</td>
                    <td>${p.titulo}</td>
                    <td class="text-end">
                        <button onclick="eliminar('${p.imdbId}')" class="btn btn-sm btn-danger">Ya la vi (Borrar)</button>
                    </td>
                </tr>
            `;
        });
    }

    // --- ELIMINAR PELÍCULA ---
    async function eliminar(id) {
        if(confirm(`¿Seguro que quieres borrar la película con ID ${id}? Ya no saldrá en Stremio.`)) {
            const response = await fetch(`/api/peliculas/${id}`, { method: 'DELETE' });
            if(response.ok) {
                cargarPeliculas(); // Refresca la tabla
            } else {
                alert("No se pudo eliminar.");
            }
        }
    }
</script>
</body>
</html>
