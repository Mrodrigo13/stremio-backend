<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio Admin - Premium</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* Diseño Base Premium */
        body {
            background-color: #0f172a; /* Azul noche muy oscuro */
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            padding: 30px 15px;
        }

        .container { max-width: 900px; }

        /* Tarjetas estilo Glass/Moderno */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            color: #f8fafc;
        }

        /* Formularios legibles y elegantes */
        .form-label { font-weight: 600; color: #94a3b8; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #ffffff; /* ¡LETRA BLANCA FORZADA! */
            border-radius: 8px;
            padding: 12px;
        }
        .form-control:focus {
            background-color: #0f172a;
            color: #ffffff;
            border-color: #6366f1;
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
        }
        .form-control::placeholder { color: #475569; }

        /* Botones con degradados */
        .btn-gradient-primary {
            background: linear-gradient(135deg, #6366f1 0%, #3b82f6 100%);
            border: none;
            color: white;
            border-radius: 8px;
            padding: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gradient-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
            color: white;
        }

        .btn-gradient-danger {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            border: none;
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }
        .btn-gradient-danger:hover { opacity: 0.8; color: white; }

        /* Tabla corregida */
        .table { color: #e2e8f0; margin-bottom: 0; }
        .table th { border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 600; border-top: none; background: transparent; }
        .table td { border-bottom: 1px solid #334155; vertical-align: middle; background: transparent; color: #f8fafc; } /* LETRA BLANCA EN TABLA */
        .table-hover tbody tr:hover td { background-color: rgba(255, 255, 255, 0.05); color: #ffffff; }

        /* Insignias personalizadas */
        .badge-id { background-color: #1e1b4b; color: #818cf8; border: 1px solid #3730a3; padding: 5px 10px; border-radius: 6px; font-family: monospace; }

        .header-title { font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body onload="cargarPeliculas()">
<div class="container">
    <h2 class="mb-5 text-center header-title">🎬 Mi Catálogo 4K Local</h2>

    <!-- SECCIÓN 1: AGREGAR PELÍCULA -->
    <div class="card p-4 mb-5">
        <h5 class="mb-4 fw-bold">Añadir Nuevo Título</h5>
        <div class="mb-4">
            <label class="form-label">ID o Enlace de IMDb</label>
            <input type="text" id="imdbId" class="form-control" placeholder="Ej: https://www.imdb.com/title/tt32246771/ o tt32246771" oninput="autoExtraerId()">
            <small id="alertaRegex" class="text-success d-none mt-1 fw-bold">✓ ID detectado y extraído</small>
        </div>
        <div class="mb-4">
            <label class="form-label">Título (Referencia interna)</label>
            <input type="text" id="titulo" class="form-control" placeholder="Ej: Predator 2025">
        </div>
        <div class="mb-4">
            <label class="form-label">Enlace Magnet o URL Local</label>
            <textarea id="magnet" class="form-control" rows="2" placeholder="magnet:?xt=urn:btih:..."></textarea>
        </div>
        <button onclick="guardar()" class="btn btn-gradient-primary w-100 fw-bold">⚡ Guardar en Servidor</button>
        <div id="mensaje" class="mt-3"></div>
    </div>

    <!-- SECCIÓN 2: GESTIÓN DE PELÍCULAS VISTAS -->
    <div class="card p-4">
        <h5 class="mb-4 fw-bold">Títulos Disponibles en Stremio</h5>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th width="20%">ID IMDb</th>
                    <th width="60%">Título</th>
                    <th width="20%" class="text-end">Acción</th>
                </tr>
                </thead>
                <tbody id="tablaPeliculas">
                <!-- Aquí se inyectan las películas desde Javascript -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function autoExtraerId() {
        const input = document.getElementById('imdbId');
        const texto = input.value;
        const alerta = document.getElementById('alertaRegex');

        const match = texto.match(/(tt\d+)/);

        if (match && texto.includes("imdb.com")) {
            input.value = match[0];
            alerta.classList.remove('d-none');
            setTimeout(() => alerta.classList.add('d-none'), 3000);
        }
    }

    async function guardar() {
        const data = {
            imdbId: document.getElementById('imdbId').value.trim(),
            titulo: document.getElementById('titulo').value.trim(),
            magnetLink: document.getElementById('magnet').value.trim(),
            posterUrl: "temp"
        };

        if(!data.imdbId || !data.magnetLink) {
            alert("El ID y el Magnet son obligatorios.");
            return;
        }

        const response = await fetch('/api/peliculas', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        if(response.ok) {
            document.getElementById('mensaje').innerHTML = '<div class="alert alert-success mt-2 py-2 fw-bold bg-success text-white border-0">¡Guardado con éxito!</div>';
            document.getElementById('imdbId').value = '';
            document.getElementById('titulo').value = '';
            document.getElementById('magnet').value = '';
            cargarPeliculas();
            setTimeout(() => document.getElementById('mensaje').innerHTML = '', 3000);
        } else {
            alert("Error al guardar. Verifica que el ID no esté duplicado.");
        }
    }

    async function cargarPeliculas() {
        const response = await fetch('/api/peliculas');
        const peliculas = await response.json();
        const tbody = document.getElementById('tablaPeliculas');
        tbody.innerHTML = '';

        peliculas.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="badge-id">${p.imdbId}</span></td>
                    <td class="fw-semibold">${p.titulo}</td>
                    <td class="text-end">
                        <button onclick="eliminar('${p.imdbId}')" class="btn btn-gradient-danger">🗑️ Ya la vi</button>
                    </td>
                </tr>
            `;
        });
    }

    async function eliminar(id) {
        if(confirm(`¿Seguro que quieres borrar la película con ID ${id}?`)) {
            const response = await fetch(`/api/peliculas/${id}`, { method: 'DELETE' });
            if(response.ok) {
                cargarPeliculas();
            } else {
                alert("No se pudo eliminar.");
            }
        }
    }
</script>
</body>
</html>
